Description: Randomisation
Category: Control
Classes:
 - A

TargetVersions:
 - v1.2
 - v1.3

Preconditions:
  required_clients:
    - id: client

Steps:
  - id: (A) PRECONDITION
    repeat_until_pass: true
    client: client
    instructions:
      - The utility server is configured with five sequential, non-overlapping active controls, each with - Duration = 120s, randomizeStart = 60s, opModExpLimW = 200% of the DER's rated active power.
    admin_instructions:
      - type: ensure-end-device
        parameters:
          registered: true
      - type: create-der-control
        parameters:
          status: scheduled
          opModExpLimW: $(setMaxW * 2)
          duration_seconds: 120
          randomizeStart_seconds: 60
          start_offset_seconds: 60
      - type: create-der-control
        parameters:
          status: scheduled
          opModExpLimW: $(setMaxW * 2)
          duration_seconds: 120
          randomizeStart_seconds: 60
          start_offset_seconds: 260
      - type: create-der-control
        parameters:
          status: scheduled
          opModExpLimW: $(setMaxW * 2)
          duration_seconds: 120
          randomizeStart_seconds: 60
          start_offset_seconds: 460
      - type: create-der-control
        parameters:
          status: scheduled
          opModExpLimW: $(setMaxW * 2)
          duration_seconds: 120
          randomizeStart_seconds: 60
          start_offset_seconds: 660
      - type: create-der-control
        parameters:
          status: scheduled
          opModExpLimW: $(setMaxW * 2)
          duration_seconds: 120
          randomizeStart_seconds: 60
          start_offset_seconds: 860
    action:
      type: discovery
      parameters:
        resources:
          - EndDevice
          - DERControl
    checks:
      - type: der-control
        parameters:
          minimum_count: 5
          maximum_count: 5
          opModExpLimW: $(setMaxW * 2)
          randomizeStart: 60
          event_status: 0 # Scheduled (non-overlapping)
          duration: 120
