Description: Reject String LFDIs
Category: Edge Cases
Classes:
 - A

TargetVersions:
 - v1.2

Preconditions:
  required_clients:
    - id: client
  
Steps:
  - id: PRECONDITION
    repeat_until_pass: true
    admin_instructions:
      - type: ensure-end-device
        parameters:
          registered: false
    action:
      type: discovery
      parameters:
        resources:
          - DeviceCapability
          - EndDevice
    checks:
      - type: end-device # Block UNTIL there is no existing EndDevice registration
        parameters:
          matches_client: false

  - id: 1 - Register EndDevice - Expect rejection from malformed LFDI
    action: 
      type: insert-end-device
      parameters:
        force_lfdi: ZZZZZZZZZZZZZZZZ
        expect_rejection: true
