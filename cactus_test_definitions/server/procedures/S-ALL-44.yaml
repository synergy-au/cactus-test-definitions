Description: Scheduling
Category: Control
Classes:
 - A

TargetVersions:
 - v1.2
 - v1.3

Preconditions:
  required_clients:
    - id: client
  
Steps:
  - id: (A) PRECONDITION
    repeat_until_pass: true
    client: client
    instructions:
      - The utility server is configured to generate a schedule of 24 sequential, non-overlapping controls with a range of export and/or import limits, each with 1min duration.
    admin_instructions:
      - type: ensure-end-device
        parameters:
          registered: true
      - type: create-der-control
        parameters:
          status: scheduled
          duration_seconds: 60
          opModExpLimW: $(setMaxW * 0.1)
      - type: create-der-control
        parameters:
          status: scheduled
          duration_seconds: 60
          opModExpLimW: $(setMaxW * 0.6)
      - type: create-der-control
        parameters:
          status: scheduled
          duration_seconds: 60
          opModExpLimW: $(setMaxW * 0.3)
      - type: create-der-control
        parameters:
          status: scheduled
          duration_seconds: 60
          opModExpLimW: $(setMaxW * 0.85)
      - type: create-der-control
        parameters:
          status: scheduled
          duration_seconds: 60
          opModExpLimW: $(setMaxW * 0.2)
      - type: create-der-control
        parameters:
