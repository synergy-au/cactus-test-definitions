    action:
      type: discovery
      parameters:
        resources:
          - EndDevice
          - DERControl
    checks:
      - type: der-control
        parameters:
          minimum_count: 24
          event_status: 0 # Scheduled (will ensure non overlapping , superseeded)
          duration: 60
  
  - id: (1) DERControlQuery
    client: client
    action: 
      type: discovery
      parameters:
        list_limit: 10  # sets s=0, l=10 for paging
        resources:
          - DERControl
    checks:
      - type: der-control
        parameters:
          minimum_count: 10
          maximum_count: 10
          event_status: 0
          duration: 60
  