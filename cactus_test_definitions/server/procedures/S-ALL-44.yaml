          duration_seconds: 60
          opModExpLimW: $(setMaxW * 0.55)
      - type: create-der-control
        parameters:
          status: scheduled
          duration_seconds: 60
          opModExpLimW: $(setMaxW * 1.0)
      - type: create-der-control
        parameters:
          status: scheduled
          duration_seconds: 60
          opModExpLimW: $(setMaxW * 0.35)
      - type: create-der-control
        parameters:
          status: scheduled
          duration_seconds: 60
          opModExpLimW: $(setMaxW * 0.8)
      - type: create-der-control
        parameters:
          status: scheduled
