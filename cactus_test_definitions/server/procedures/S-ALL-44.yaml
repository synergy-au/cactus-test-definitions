          duration_seconds: 60
          opModExpLimW: $(setMaxW * 0.75)
      - type: create-der-control
        parameters:
          status: scheduled
          duration_seconds: 60
          opModExpLimW: $(setMaxW * 0.4)
      - type: create-der-control
        parameters:
