Description: S-ALL-07 Select Edge Cases for Telemetry Reporting
Category: Monitoring
Classes:
 - A

TargetVersions:
 - v1.2

Preconditions:
  required_clients:
    - id: client

Steps:
  - id: PRECONDITION
    repeat_until_pass: true
    admin_instructions:
      - type: ensure-end-device
        parameters:
          registered: true
    action:
      type: discovery
      parameters:
        resources:
          - EndDevice
          - DER
          - MirrorUsagePoint
    checks:
      - type: end-device 
        parameters:
          matches_client: true

  - id: Create MUP # Post an initial MirrorUsagePoint to be overwritten later.
    action: 
      type: upsert-mup
      parameters:
        mup_id: mup_mrid_1
        set_mup_mrid: AAAAAAAAAAAAAAAAAAAAAAA000000001
        reading_types:
          - ActivePowerAverage
          - VoltageSinglePhaseAverage
        mmr_mrids:
          - BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB
          - CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC
        location: Site  # Set the roleflags
    checks:
      - type: mirror-usage-point
        parameters:
          matches: true

  - id: STEP 1 - UPDATE MUP ROLEFLAGS # Post same MirrorUsagePoint mRID with different roleFlags
    action: 
      type: upsert-mup
      parameters:
        mup_id: mup_mrid_1
        set_mup_mrid: AAAAAAAAAAAAAAAAAAAAAAA000000001
        reading_types: 
          - ActivePowerAverage
          - VoltageSinglePhaseAverage
        mmr_mrids:
          - BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB
          - CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC
        location: Device  # Update the roleflage
    checks:
      - type: mirror-usage-point
        parameters:
          matches: true

  - id: POST INITIAL READING
    action: 
      type: insert-readings
      parameters:
        mup_id: mup_mrid_1
        values:
          ActivePowerAverage: [5000]
          VoltageSinglePhaseAverage: [240.0]
        mmr_mrids:
          - BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB
          - CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC

  - id: STEP 2 - UPDATE READING # Post MirrorMeterReading with same mmr mRID but different value
    action:
      type: insert-readings
      parameters:
        mup_id: mup_mrid_1
        values:
          ActivePowerAverage: [6000]
        mmr_mrids:
          - BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB
        # NOTE: We do not have the option to request readings, so cannot verify the result of this upsert

  - id: STEP 3 - UPDATE MUP TYPE # Post MirrorUsagePoint with same mRID but different reading type - server must overwrite, not duplicate
    action:
      type: upsert-mup
      parameters:
        mup_id: mup_mrid_1
        set_mup_mrid: AAAAAAAAAAAAAAAAAAAAAAA000000001
        reading_types:
          - ReactivePowerAverage  # Changed from ActivePowerAverage
          - VoltageSinglePhaseAverage
        mmr_mrids:
          - BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB
          - CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC
        location: Device
    checks:
      - type: mirror-usage-point
        parameters:
          matches: true
