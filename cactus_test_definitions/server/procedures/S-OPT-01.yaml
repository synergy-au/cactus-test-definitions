Description: Discovery Rejecting In-Band Registration
Category: Registration
Classes:
 - A

TargetVersions:
 - v1.2

Preconditions:
  required_clients:
    - id: client
  
Steps:
  - id: PRECONDITION
    repeat_until_pass: true
    admin_instructions:
      - type: ensure-end-device
        parameters:
          registered: true
    action:
      type: discovery
      parameters:
        resources:
          # BRIDGE due to non-availability
          - DeviceCapability
#          - Time
#          - MirrorUsagePointList
          - EndDevice
#          - DER
    checks:
      - type: end-device # This will be the check that will block UNTIL there is an existing EndDevice registration
        parameters:
          matches_client: true

  - id: REGISTER AGAIN
    action: 
      type: insert-end-device
      parameters: 
        expect_rejection: true
    checks:
      - type: end-device
        parameters:
          matches_client: true 

  
