Description: Validation of Scaling Factors
Category: Control
Classes:
  - A

TargetVersions:
  - v1.2
  - v1.3-beta/storage
  - v1.3

Criteria:
  checks:
    - type: all-steps-complete
      parameters: {}

    # TS 5573 states "Control responses sent by the DER client reflect the ongoing status of each control..."
    # There is a chance that the controls might overlap slightly (depending on client polling) so we just cover
    # the received/started Responses - other tests cover this in more detail
    - type: response-contents
      parameters:
        all: true
        status: 1 # Received
    - type: response-contents
      parameters:
        all: true
        status: 2 # Started

Preconditions:
  init_actions:
    - type: set-comms-rate
      parameters:
        dcap_poll_seconds: 120
        edev_list_poll_seconds: 120
        fsa_list_poll_seconds: 120
        der_list_poll_seconds: 120
        derp_list_poll_seconds: 120
        mup_post_seconds: 60
  checks:
    - type: end-device-contents
      parameters: {}
    - type: der-settings-contents
      parameters: {}
  actions:
    - type: create-der-program
      parameters:
        primacy: 0
    - type: set-default-der-control
      parameters:
        opModImpLimW: 0
        opModExpLimW: 0
        setGradW: 27

  instructions:
    - DER shall be exporting or importing at least 50% of its active power rating at the connection point.
    
Steps:
  # (precondition)
  GET-DERC-1:
    event:
      type: GET-request-received
      parameters:
        endpoint: /edev/1/fsa/1/derp
    actions:
      - type: create-der-control
        parameters:
          start: $(now)
          duration_seconds: 120
          opModExpLimW: $(maxExportW * 2)
          opModImpLimW: $(maxImportW * 2)
      - type: enable-steps
        parameters:
          steps:
            - GET-DERC-2
      - type: remove-steps
        parameters:
          steps:
            - GET-DERC-1


  # (a, b)
  GET-DERC-2:
    event:
      type: GET-request-received
      parameters:
        endpoint: /edev/1/fsa/1/derp
    actions:
      - type: create-der-control
        parameters:
          start: $(now)
          duration_seconds: 120
          opModExpLimW: $(maxExportW * 0.3)
          opModImpLimW: $(maxImportW * 0.3)
          pow_10_multipliers: 2
      - type: enable-steps
        parameters:
          steps:
            - GET-DERC-3
      - type: remove-steps
        parameters:
          steps:
            - GET-DERC-2

  # (c, d)
  GET-DERC-3:
    event:
      type: GET-request-received
      parameters:
        endpoint: /edev/1/fsa/1/derp
    actions:
      - type: create-der-control
        parameters:
          start: $(now)
          duration_seconds: 120
          opModExpLimW: $(maxExportW * 0.4)
          opModImpLimW: $(maxImportW * 0.4)
          pow_10_multipliers: 1
      - type: enable-steps
        parameters:
          steps:
            - WAIT-TEST-END
      - type: remove-steps
        parameters:
          steps:
            - GET-DERC-3

  # Give the control a chance to run and finish
  WAIT-TEST-END:
    event:
      type: wait
      parameters:
        duration_seconds: 180
    actions:
      - type: remove-steps
        parameters:
          steps:
            - WAIT-TEST-END
      - type: finish-test
        parameters: {}
