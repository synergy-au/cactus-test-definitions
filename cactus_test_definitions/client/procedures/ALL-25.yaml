Description: Active control ramp rates
Category: Control
Classes:
  - A

TargetVersions:
  - v1.2
  - v1.3-beta/storage
  - v1.3

Criteria:
  checks:
    - type: all-steps-complete
      parameters: {}

Preconditions:
  init_actions:
    - type: set-comms-rate
      parameters:
        dcap_poll_seconds: 60
        edev_list_poll_seconds: 60
        fsa_list_poll_seconds: 60
        der_list_poll_seconds: 60
        derp_list_poll_seconds: 60
        mup_post_seconds: 60
    - type: create-der-program
      parameters:
        primacy: 0
    - type: set-default-der-control
      parameters:
        opModImpLimW: 0
        opModExpLimW: 0
        setGradW: 100 # this is the precondition from 5573

  checks:
    - type: end-device-contents
      parameters: {}
    - type: der-settings-contents
      parameters: {}
  
  instructions:
    - DER shall be exporting or importing at least 50% of its active power rating at the connection point.
    
Steps:

  # (a, b)
  GET-DERP-LIST-1:
    event:
      type: GET-request-received
      parameters:
        endpoint: /edev/1/fsa/1/derp
    actions:
      - type: create-der-control
        parameters:
          start: $(now)
          duration_seconds: 120
          opModExpLimW: $(maxExportW * 0.3)
          opModImpLimW: $(maxImportW * 0.3)
          ramp_time_seconds: 60
      - type: enable-steps
        parameters:
          steps:
            - WAIT-CONTROL-1-FINISH
      - type: remove-steps
        parameters:
          steps:
            - GET-DERP-LIST-1

  # (b)
  WAIT-CONTROL-1-FINISH:
    event:
      type: wait
      parameters:
        duration_seconds: 130
    actions:
      - type: enable-steps
        parameters:
          steps:
            - GET-DERP-LIST-2
      - type: remove-steps
        parameters:
          steps:
            - WAIT-CONTROL-1-FINISH
    instructions:
      - DER should ramp to 30% of the DER's active power over a 60s period

  # (c, d)
  GET-DERP-LIST-2:
    event:
      type: GET-request-received
      parameters:
        endpoint: /edev/1/fsa/1/derp
    actions:
      - type: create-der-control
        parameters:
          start: $(now)
          duration_seconds: 120
          opModExpLimW: $(maxExportW * 0.5)
          opModImpLimW: $(maxImportW * 0.5)
      - type: enable-steps
        parameters:
          steps:
            - WAIT-CONTROL-2-FINISH
      - type: remove-steps
        parameters:
          steps:
            - GET-DERP-LIST-2
  
  # (d)
  WAIT-CONTROL-2-FINISH:
    event:
      type: wait
      parameters:
        duration_seconds: 180
    actions:
      - type: remove-steps
        parameters:
          steps:
            - WAIT-CONTROL-2-FINISH
      - type: finish-test
        parameters: {}
    instructions:
      - DER should ramp to 50% of the DER's active power at the rate of setGradW (currently 1 %/s)
