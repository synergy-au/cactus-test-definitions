Description: Disconnection of DER
Category: DER
Classes:
  - DER-A

TargetVersions:
  - v1.2
  - v1.3-beta/storage
  - v1.3

Criteria:
  checks:
    - type: all-steps-complete
      parameters: {}

Preconditions:
  init_actions:
    - type: set-comms-rate
      parameters:
        dcap_poll_seconds: 60
        edev_list_poll_seconds: 60
        fsa_list_poll_seconds: 60
        der_list_poll_seconds: 60
        derp_list_poll_seconds: 60
        mup_post_seconds: 60
  checks: 
    - type: end-device-contents
      parameters: {}
    - type: der-settings-contents
      parameters: {}
  actions:
    - type: create-der-program
      parameters:
        primacy: 0
    
Steps:
  # (precondition)
  PRECONDITION-STARTUP:
    instructions:
      - This step is to give time for the DER to start importing/exporting at least 50% of its rated power.
    event:
      type: GET-request-received
      parameters:
        endpoint: /edev/1/fsa/1/derp
    actions:
      - type: create-der-control
        parameters:
          start: $(now)
          duration_seconds: 240
          opModExpLimW: $(maxExportW * 2)
          opModImpLimW: $(maxImportW * 2)
          tag: DERC1
      - type: enable-steps
        parameters:
          steps:
            - PRECONDITION-STARTUP-WAIT
      - type: remove-steps
        parameters:
          steps:
            - PRECONDITION-STARTUP
  
  # (precondition)
  PRECONDITION-STARTUP-WAIT:
    instructions:
      - This step is to give time for the DER to start importing/exporting at least 50% of its rated power.
    event:
      type: wait
      parameters:
        duration_seconds: 120
    actions:
      - type: enable-steps
        parameters:
          steps:
            - GET-DERC-DISCONNECT
      - type: remove-steps
        parameters:
          steps:
            - PRECONDITION-STARTUP-WAIT

  # (a, b)
  GET-DERC-DISCONNECT:
    event:
      type: GET-request-received
      parameters:
        endpoint: /edev/1/fsa/1/derp
    actions:
      - type: create-der-control
        parameters:
          start: $(now)
          duration_seconds: 300
          opModConnect: false
          tag: DISCONNECT
      - type: enable-steps
        parameters:
          steps:
            - PUT-DERSTATUS-DISCONNECT
      - type: remove-steps
        parameters:
          steps:
            - GET-DERC-DISCONNECT

  # (c, d)
  PUT-DERSTATUS-DISCONNECT:
    event:
      type: PUT-request-received
      parameters:
        endpoint: /edev/1/der/1/ders
        serve_request_first: true # Run this AFTER server receives the request
      # Only trigger this if the server has an updated DERStatus
      checks:
        - type: der-status-contents
          parameters: 
            genConnectStatus_bit0: false
    actions:
      - type: remove-steps
        parameters:
          steps:
            - PUT-DERSTATUS-DISCONNECT
      - type: create-der-control
        parameters:
          start: $(now)
          duration_seconds: 300
          opModConnect: true
          tag: CONNECT
      - type: enable-steps
        parameters:
          steps:
            - PUT-DERSTATUS-CONNECT

  # (e)
  PUT-DERSTATUS-CONNECT:
    event:
      type: PUT-request-received
      parameters:
        endpoint: /edev/1/der/1/ders
        serve_request_first: true # Run this AFTER server receives the request
      # Only trigger this if the server has an updated DERStatus
      checks:
        - type: der-status-contents
          parameters: 
            genConnectStatus_bit0: true
    actions:
      - type: enable-steps
        parameters:
          steps:
            - PROCEED-OBSERVE-DER
      - type: remove-steps
        parameters:
          steps:
            - PUT-DERSTATUS-CONNECT


  PROCEED-OBSERVE-DER:
    instructions:
      - The device should now be observed ramping import/export after reconnecting
    event:
      type: proceed
      parameters:
        timeout_seconds: 300
    actions:
      - type: remove-steps
        parameters:
          steps:
            - PROCEED-OBSERVE-DER